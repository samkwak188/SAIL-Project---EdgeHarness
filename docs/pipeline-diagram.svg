<svg viewBox="0 0 920 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How a task flows through the SAIL harness</title>
<desc>User submits a task, the router classifies it, then it goes to one of three tiers: specialist adapter (not yet built), worker agent loop (built, Claude-Code-style), or generalist ensemble+judge (not yet built). All paths converge on a verifier gate before returning to the user.</desc>
<defs>
<style>
  svg { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .bg { fill: #ffffff; }
  .box { fill: #f4f4f5; stroke: #52525b; stroke-width: 1.5; }
  .box-built { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
  .box-planned { fill: #fafafa; stroke: #a1a1aa; stroke-width: 1.5; stroke-dasharray: 6 4; }
  .box-loop { fill: #eef9f0; stroke: #16a34a; stroke-width: 2; }
  .title { font-size: 15px; font-weight: 600; fill: #18181b; }
  .sub { font-size: 11.5px; fill: #52525b; }
  .tag { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
  .tag-built { fill: #4338ca; }
  .tag-planned { fill: #71717a; }
  .arrow { stroke: #71717a; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead); }
  .arrow-dash { stroke: #a1a1aa; stroke-width: 1.4; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrowhead); }
  .loop-arrow { stroke: #16a34a; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead-g); }
  .section-label { font-size: 12px; font-weight: 700; fill: #3f3f46; }
  .legend-text { font-size: 11px; fill: #3f3f46; }
</style>
<marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#71717a"/></marker>
<marker id="arrowhead-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="920" height="900"/>

<!-- User -->
<rect class="box" x="370" y="16" width="180" height="46" rx="8"/>
<text x="460" y="38" text-anchor="middle" class="title">User</text>
<text x="460" y="53" text-anchor="middle" class="sub">submits a task</text>

<path class="arrow" d="M460,62 L460,92"/>

<!-- Router -->
<rect class="box-built" x="330" y="94" width="260" height="56" rx="8"/>
<text x="460" y="118" text-anchor="middle" class="title">Router</text>
<text x="460" y="134" text-anchor="middle" class="sub">keyword + embedding classify</text>
<text x="580" y="146" text-anchor="end" class="tag tag-built">BUILT</text>

<path class="arrow" d="M400,150 C300,180 220,200 180,230"/>
<path class="arrow" d="M460,150 L460,230"/>
<path class="arrow" d="M520,150 C620,180 700,200 740,230"/>

<!-- Three tiers -->
<rect class="box-planned" x="90" y="232" width="180" height="60" rx="8"/>
<text x="180" y="256" text-anchor="middle" class="title" font-size="13">Specialist tier</text>
<text x="180" y="272" text-anchor="middle" class="sub">LoRA adapter, per task type</text>
<text x="264" y="286" text-anchor="end" class="tag tag-planned">NOT BUILT</text>

<rect class="box-loop" x="365" y="232" width="190" height="60" rx="8"/>
<text x="460" y="256" text-anchor="middle" class="title" font-size="13">Worker agent loop</text>
<text x="460" y="272" text-anchor="middle" class="sub">Claude-Code-style tool loop</text>
<text x="549" y="286" text-anchor="end" class="tag tag-built">BUILT</text>

<rect class="box-planned" x="650" y="232" width="180" height="60" rx="8"/>
<text x="740" y="252" text-anchor="middle" class="title" font-size="13">Generalist tier</text>
<text x="740" y="268" text-anchor="middle" class="sub">ensemble of models + judge</text>
<text x="740" y="282" text-anchor="middle" class="sub" font-size="10.5">picks the best candidate</text>
<text x="824" y="296" text-anchor="end" class="tag tag-planned">NOT BUILT</text>

<!-- Zoomed loop detail under worker box -->
<rect x="330" y="330" width="260" height="230" rx="10" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
<text x="460" y="352" text-anchor="middle" class="section-label">Inside the worker loop (mini-swe-agent style)</text>

<circle cx="460" cy="440" r="70" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.3"/>

<rect class="box-loop" x="415" y="368" width="90" height="38" rx="7"/>
<text x="460" y="391" text-anchor="middle" class="sub" font-size="11" fill="#166534">model decides</text>

<rect class="box-loop" x="500" y="425" width="95" height="38" rx="7"/>
<text x="547" y="448" text-anchor="middle" class="sub" font-size="11" fill="#166534">tool call (read/edit/bash)</text>

<rect class="box-loop" x="415" y="482" width="90" height="38" rx="7"/>
<text x="460" y="505" text-anchor="middle" class="sub" font-size="11" fill="#166534">executor runs it</text>

<rect class="box-loop" x="325" y="425" width="95" height="38" rx="7"/>
<text x="372" y="448" text-anchor="middle" class="sub" font-size="11" fill="#166534">feedback appended</text>

<path class="loop-arrow" d="M498,388 C520,395 535,405 540,425"/>
<path class="loop-arrow" d="M550,463 C550,478 500,486 465,486"/>
<path class="loop-arrow" d="M418,494 C395,486 380,470 375,463"/>
<path class="loop-arrow" d="M370,425 C378,408 398,394 415,388"/>
<text x="460" y="540" text-anchor="middle" class="sub" font-size="10.5">repeats until the model stops calling tools or max turns hit</text>

<!-- Converge to verifier -->
<path class="arrow" d="M180,292 C260,340 340,460 420,562"/>
<path class="arrow" d="M460,560 L460,592"/>
<path class="arrow-dash" d="M740,292 C660,340 580,460 500,562"/>

<!-- Verifier gate -->
<rect class="box-built" x="330" y="594" width="260" height="56" rx="8"/>
<text x="460" y="618" text-anchor="middle" class="title">Verifier gate</text>
<text x="460" y="634" text-anchor="middle" class="sub">runs tests / checks the output</text>
<text x="580" y="646" text-anchor="end" class="tag tag-built">BUILT</text>

<path class="arrow" d="M460,650 L460,680"/>

<!-- Escalation loop -->
<path class="arrow-dash" d="M330,622 C240,622 200,500 200,400 C200,340 220,300 240,270" />
<text x="150" y="500" text-anchor="middle" class="sub" transform="rotate(-90 150 500)">fail → escalate up a tier (max 2 retries)</text>

<!-- Output -->
<rect class="box" x="370" y="682" width="180" height="46" rx="8"/>
<text x="460" y="704" text-anchor="middle" class="title">Result → user</text>
<text x="460" y="719" text-anchor="middle" class="sub">pass or fail verdict</text>

<!-- Legend -->
<rect x="90" y="770" width="740" height="100" rx="8" fill="none" stroke="#d4d4d8" stroke-width="1"/>
<text x="110" y="794" class="section-label">Legend</text>
<rect x="110" y="806" width="26" height="16" rx="3" class="box-built"/>
<text x="144" y="818" class="legend-text">Built &amp; verified against a live model today</text>
<rect x="110" y="830" width="26" height="16" rx="3" class="box-planned"/>
<text x="144" y="842" class="legend-text">Config/placeholder only — no execution logic yet</text>
<rect x="450" y="806" width="26" height="16" rx="3" class="box-loop"/>
<text x="484" y="818" class="legend-text">The agent's tool-call loop, run by the worker</text>
<text x="450" y="842" class="legend-text" font-size="10.5">Dashed arrow = escalation path on gate failure</text>
</svg>
