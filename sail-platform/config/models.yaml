providers:
  gpu_70b:
    type: openai_compatible
    base_url: http://localhost:8000/v1
    model: qwen3-72b-awq
    guided_json: true          # vLLM/SGLang structured output for WorkflowPlan
  edge_8b:
    type: ollama
    base_url: http://edge-node:11434
    model: qwen3-8b

embedding:
  provider: fastembed          # fully local — never a cloud embedding API
  model: BAAI/bge-small-en-v1.5     # d=384; upgrade to bge-m3 (d=1024) if recall short
  dim: 384                     # must match memory.turbovec.dim

role_mapping:
  smol: [edge_8b]
  default: [gpu_70b]
  slow: [gpu_70b]           # ensemble adds 2nd provider when available
  plan: [gpu_70b]
  judge: [edge_8b]          # judge ≠ maker family where possible (anti self-grading)

ensemble:
  generalist:
    models: [gpu_70b]       # add llama-70b, deepseek when multi-GPU available
    candidates: 3
    selection: verifier       # automated on verifiable; judge on subjective
    serving: sequential_ok    # v2 plan §7 fallback: swap models during scoring
                              # windows if VRAM can't hold the pool concurrently
